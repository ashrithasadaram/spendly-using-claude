{% extends "base.html" %}

{% block content %}
<div class="profile-container">
    <h1>Welcome, {{ user['name'] }}!</h1>
    <div class="profile-info">
        <p><strong>Email:</strong> {{ user['email'] }}</p>
        <p><strong>Account created:</strong> {{ user['created_at'] }}</p>
    </div>
</div>
{% endblock %}
