{% extends "base.html" %}

{% block title %}Edit expense — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Edit expense</h1>
            <p class="auth-subtitle">Update the details for this transaction</p>
        </div>

        <div class="auth-card">
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('edit_expense', id=expense.id) }}">
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" name="amount"
                           class="form-input" step="0.01" min="0.01"
                           placeholder="0.00"
                           value="{{ amount_value }}"
                           required autofocus>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category"
                            class="form-input" required>
                        <option value="" disabled {% if not category_value %}selected{% endif %}>
                            Select a category
                        </option>
                        {% for c in categories %}
                        <option value="{{ c }}" {% if c == category_value %}selected{% endif %}>
                            {{ c }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input"
                           value="{{ date_value }}"
                           required>
                </div>

                <div class="form-group">
                    <label for="description">Description (optional)</label>
                    <textarea id="description" name="description"
                              class="form-input" rows="3"
                              maxlength="255"
                              placeholder="e.g. Lunch with Alex">{{ description_value }}</textarea>
                </div>

                <button type="submit" class="btn-submit">Save changes</button>
            </form>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('expense_detail', id=expense.id) }}">← Back to detail</a>
            · <a href="{{ url_for('expenses') }}">View all expenses</a>
        </p>

    </div>
</section>

{% endblock %}
